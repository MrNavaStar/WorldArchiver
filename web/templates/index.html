<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>WorldArchive</title>

    <link href="{{ request.scope.get('root_path', '') }}/static/index.css" rel="stylesheet">
    <link href="https://fonts.cdnfonts.com/css/minecraft-4" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@48,400,0,0" />
</head>
<body>
    <script src="https://unpkg.com/magic-grid/dist/magic-grid.min.js"></script>

    <div class="container">
        {% for server in metadata %}
        <div class="server_item">
            <div class="bg" style="background-image: url('content/{{ server.image }}');"></div>

            <div class="text">
                <h1>{{ server.name }}</h1>
                <h3>{{ server.date_range }}</h3>
            </div>

            {% if "world" in server %}
            <div class="bottom_bar">
                <h4 style="margin-top: 28px; margin-left: 30px">{{ server.version }}</h4>

                {% if "mods" in server %}
                <a class="material-symbols-outlined" style="margin-left: 110px; margin-bottom: 5px;" href="content/{{ server.mods }}" download="{{ server.name }}-mods.zip">widgets</a>
                <a class="material-symbols-outlined" style="margin-left: 10px; margin-bottom: 5px" href="content/{{ server.world }}" download="{{ server.name }}.zip">download</a>
                <a class="material-symbols-outlined" style="margin-left: 10px; margin-bottom: 5px" href="map/#{{ server.map_name }}:0:0:0:1500:0:0:0:0:perspective">map</a>
                {% else %}
                <a class="material-symbols-outlined" style="margin-left: 145px; margin-bottom: 5px" href="content/{{ server.world }}" download="{{ server.name }}.zip">download</a>
                <a class="material-symbols-outlined" style="margin-left: 10px; margin-bottom: 5px" href="map/#{{ server.map_name }}:0:0:0:1500:0:0:0:0:perspective">map</a>
                {% endif %}

            </div>
            {% endif %}

        </div>
        {% endfor %}

        <button class="server_item upload_item" id="open-upload-modal" type="button" aria-label="Upload new world">
            <span class="material-symbols-outlined">add</span>
            <p>Upload World</p>
        </button>
    </div>

    <div class="upload_modal_overlay" id="upload-modal-overlay" aria-hidden="true">
        <div class="upload_modal" role="dialog" aria-modal="true" aria-labelledby="upload-modal-title">
            <div class="upload_modal_header">
                <h2 id="upload-modal-title">Upload World</h2>
                <button type="button" id="close-upload-modal" class="modal_close" aria-label="Close upload dialog">
                    <span class="material-symbols-outlined">close</span>
                </button>
            </div>

            <form class="upload_form" method="post" action="/upload" enctype="multipart/form-data">
                <label>
                    World Name
                    <input name="name" type="text" required placeholder="e.g. Survival SMP">
                </label>

                <label>
                    Date Range
                    <div class="date_range_inputs">
                        <input name="date_start" type="date" required>
                        <span>to</span>
                        <input name="date_end" type="date" required>
                    </div>
                </label>

                <label>
                    Description
                    <textarea name="description" rows="3" placeholder="Short summary for info.json"></textarea>
                </label>

                <label>
                    World ZIP
                    <input name="world_zip" type="file" accept=".zip" required>
                </label>

                <label>
                    Mods ZIP (optional)
                    <input name="mods_zip" type="file" accept=".zip">
                </label>

                <label>
                    Images
                    <input name="images" type="file" accept="image/*" multiple>
                </label>

                <div class="form_actions">
                    <button type="button" class="secondary" id="cancel-upload-modal">Cancel</button>
                    <button type="submit">Save Upload</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const magicGrid = new MagicGrid({
          container: '.container',
          animate: true,
          static: true,
          useMin: true
        });

        magicGrid.listen();

        const uploadOverlay = document.getElementById('upload-modal-overlay');
        const openUploadButton = document.getElementById('open-upload-modal');
        const closeUploadButton = document.getElementById('close-upload-modal');
        const cancelUploadButton = document.getElementById('cancel-upload-modal');

        function closeUploadModal() {
            uploadOverlay.classList.remove('open');
            uploadOverlay.setAttribute('aria-hidden', 'true');
        }

        function openUploadModal() {
            uploadOverlay.classList.add('open');
            uploadOverlay.setAttribute('aria-hidden', 'false');
        }

        openUploadButton.addEventListener('click', openUploadModal);
        closeUploadButton.addEventListener('click', closeUploadModal);
        cancelUploadButton.addEventListener('click', closeUploadModal);

        uploadOverlay.addEventListener('click', function (event) {
            if (event.target === uploadOverlay) {
                closeUploadModal();
            }
        });

        document.addEventListener('keydown', function (event) {
            if (event.key === 'Escape') {
                closeUploadModal();
            }
        });
    </script>
</body>
</html>
